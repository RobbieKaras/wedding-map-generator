<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Map Builder</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <h1>Map Builder</h1>
        <div class="input-group">
            <label>Couple's Names</label>
            <input type="text" id="eventName" placeholder="e.g. Luke & Sam">
        </div>
        <div class="input-group">
            <label>Ceremony Address</label>
            <input type="text" id="ceremonyAddr" placeholder="Street, City, Zip">
        </div>
        <div class="input-group">
            <label>Reception Address</label>
            <input type="text" id="receptionAddr" placeholder="Street, City, Zip">
        </div>
        <button id="generateBtn" class="btn">1. Find Route</button>
        <div id="status">Ready to build.</div>
        <button id="deployBtn" class="btn secondary" disabled>2. Save Map Data</button>
    </div>

    <div id="preview-area">
        <div class="preview-container">
            <div class="preview-header">Live Preview</div>
            <div id="preview-frame"></div>
            
            <div class="preview-footer">
                <div class="stat-card">
                    <span class="stat-label">Total Distance</span>
                    <span id="stat-distance" class="stat-value">-- miles</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Est. Drive Time</span>
                    <span id="stat-time" class="stat-value">-- mins</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Map Markers</span>
                    <span id="stat-points" class="stat-value">0 Points</span>
                </div>
            </div>
        </div>
    </div>

    <script src="builder.js"></script>
</body>
</html>
